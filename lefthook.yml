pre-commit:
  commands:
    eslint:
      glob: "*.{tsx,ts,json}"
      run: |
        pnpm dlx eslint --fix {staged_files}
      stage_fixed: true
      skip:
        - merge
        - rebase
    oxfmt:
      glob: "*.{tsx,ts,json,md,yml,yaml}"
      exclude: "pnpm-lock.yaml"
      run: |
        pnpm oxfmt {staged_files}
      stage_fixed: true
      skip:
        - merge
        - rebase
