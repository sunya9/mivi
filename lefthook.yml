pre-commit:
  commands:
    oxlint:
      glob: "*.{tsx,ts,json}"
      run: |
        pnpm oxlint --fix {staged_files}
      stage_fixed: true
      skip:
        - merge
        - rebase
    oxfmt:
      glob: "*.{tsx,ts,json,md,yml,yaml}"
      run: |
        pnpm oxfmt {staged_files}
      stage_fixed: true
      skip:
        - merge
        - rebase
