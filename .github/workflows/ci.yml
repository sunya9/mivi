name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build-test:
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - uses: pnpm/action-setup@903f9c1a6ebcba6cf41d87230be49611ac97822e
        with:
          run_install: false

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(jq -r '.devDependencies.playwright' package.json)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm dlx playwright install --with-deps chromium

      - name: Knip
        run: pnpm knip

      - name: Lint
        run: pnpm lint

      - name: Format Check
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Set build metadata
        id: build-meta
        run: |
          echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
          echo "timestamp=$(git show -s --format=%cI HEAD)" >> $GITHUB_OUTPUT
        env:
          GITHUB_SHA: ${{ github.sha }}

      - name: Build
        run: pnpm run build
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
          VITE_APP_VERSION: ${{ steps.build-meta.outputs.short_sha }}
          VITE_BUILD_DATETIME: ${{ steps.build-meta.outputs.timestamp }}

      - name: Test
        run: pnpm test --coverage

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          report_type: coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: sunya9/mivi

      - name: Upload test results to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: sunya9/mivi
          report_type: test_results
          files: test-report.junit.xml

      - name: Upload build artifact
        if: github.event_name == 'push'
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  deploy:
    if: github.event_name == 'push'
    needs: build-test
    concurrency:
      group: "pages"
      cancel-in-progress: true
    runs-on: ubuntu-24.04
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Download build artifact
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: "./dist"
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
